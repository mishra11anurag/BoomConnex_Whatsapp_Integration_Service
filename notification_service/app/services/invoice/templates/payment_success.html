<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Invoice</title>

    <style>

        body{
            font-family: Arial, Helvetica, sans-serif;
            margin:40px;
            color:#333;
        }

        .header{
            display:flex;
            justify-content:space-between;
            align-items:center;
            margin-bottom:40px;
        }

        .company{
            font-size:34px;
            font-weight:bold;
            color:#ff6600;
        }

        .invoice-title{
            font-size:28px;
            font-weight:bold;
        }

        table{
            width:100%;
            border-collapse:collapse;
            margin-top:25px;
        }

        th{
            background:#ff6600;
            color:white;
            padding:12px;
        }

        td{
            padding:12px;
            border:1px solid #ddd;
        }

        .summary{
            width:300px;
            margin-left:auto;
            margin-top:30px;
        }

        .footer{
            margin-top:80px;
            text-align:center;
            font-size:14px;
            color:#666;
        }

    </style>

</head>

<body>

<div class="header">

    <div>

        <div class="company">

            BoomConnex

        </div>

        <p>

            Invoice ID :
            {{ invoice_number }}

        </p>

        <p>

            Payment ID :
            {{ payment_id }}

        </p>

    </div>

    <div class="invoice-title">

        INVOICE

    </div>

</div>

<h2>

Customer Details

</h2>

<p>

<b>Name :</b>

{{ customer_name }}

</p>

<p>

<b>Phone :</b>

{{ phone_number }}

</p>

<table>

<tr>

<th>Description</th>

<th>Amount</th>

</tr>

<tr>

<td>

{{ plan_name }}

</td>

<td>

₹ {{ amount }}

</td>

</tr>

</table>

<div class="summary">

<table>

<tr>

<td>Total</td>

<td>

₹ {{ amount }}

</td>

</tr>

</table>

</div>

<div class="footer">

Thank you for choosing BoomConnex.

</div>

</body>

</html>
